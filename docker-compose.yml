services:
  saivex:
    build: .
    container_name: saivex
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - PRODUCTION=1
    volumes:
      - ./instance:/app/instance
      - ./uploads:/app/uploads
      - ./static/generated:/app/static/generated
      - ./logs:/app/logs
    restart: unless-stopped
