<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Saivex Kalinga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Cinzel:wght@600;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:Poppins,sans-serif;height:100dvh;overflow:hidden;color:#fff7d6;background:radial-gradient(circle at top left,rgba(255,190,72,.18),transparent 35%),radial-gradient(circle at bottom right,rgba(0,212,255,.14),transparent 35%),linear-gradient(135deg,#080300,#160b02,#061324)}
.app{display:flex;height:100dvh}
.sidebar{width:270px;min-width:270px;background:rgba(10,5,1,.94);border-right:1px solid rgba(255,196,77,.22);padding:12px;overflow-y:auto;transition:.28s ease;z-index:40}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px 6px 12px;border-bottom:1px solid rgba(255,196,77,.18)}
.side-logo{width:38px;height:38px;border-radius:50%;object-fit:cover;box-shadow:0 0 15px #ffbf3c}
.brand-name{font-family:Orbitron,sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;color:#ffdf8a}
.profile-box{background:rgba(255,196,77,.08);border:1px solid rgba(255,196,77,.18);border-radius:14px;padding:10px;margin-bottom:12px}
.profile-title{font-size:10px;color:#d6b86c;margin-bottom:4px}
.profile-name{font-family:Cinzel,serif;font-size:13px;font-weight:900;color:#ffe9a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-links{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}
.side-link{display:block;text-align:center;padding:8px;border-radius:10px;background:rgba(255,196,77,.12);color:#ffe9a8;text-decoration:none;font-size:11px}
.logout{background:rgba(239,68,68,.18);color:#fecaca}
.sidebar-actions{display:flex;gap:8px;margin-bottom:10px}.new-chat{flex:1;border:none;border-radius:12px;cursor:pointer;font-size:12px;font-weight:900;padding:10px;color:#1b0c00;background:linear-gradient(90deg,#ffb72e,#b66a00)}.clear-chat{width:58px;border:none;border-radius:12px;cursor:pointer;font-size:11px;font-weight:800;padding:10px;background:rgba(239,68,68,.20);color:#fecaca}
.search-box{width:100%;padding:10px;border:none;outline:none;border-radius:12px;background:rgba(255,196,77,.08);border:1px solid rgba(255,196,77,.16);color:#fff7d6;margin-bottom:12px;font-size:12px}
.section-title{font-family:Cinzel,serif;font-size:12px;color:#ffd97a;margin:13px 0 8px}.folder-title{font-size:11px;color:#d6b86c;margin:10px 0 5px}
.conversation-item{display:flex;align-items:center;gap:7px;padding:10px 9px;border-radius:11px;font-size:12.5px;color:#fff2bf;cursor:pointer}.conversation-item:hover,.conversation-item.active{background:rgba(255,196,77,.12)}.conv-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.memory-box,.document-box{background:rgba(255,196,77,.07);border:1px solid rgba(255,196,77,.17);border-radius:12px;padding:9px;margin-bottom:7px;font-size:11.5px;color:#fff1bf;display:flex;justify-content:space-between;gap:7px}.delete-memory,.delete-document{border:none;background:rgba(239,68,68,.25);color:#fecaca;border-radius:6px;padding:3px 6px;cursor:pointer;font-size:10px}
.main{flex:1;position:relative;min-width:0;height:100dvh}.header{height:86px;display:flex;justify-content:center;align-items:center;gap:16px;background:rgba(12,6,1,.58);border-bottom:1px solid rgba(255,196,77,.23)}
.mobile-menu{display:none;position:absolute;left:14px;top:20px;width:44px;height:44px;border:none;border-radius:13px;background:rgba(255,196,77,.13);color:#fff1bf;font-size:22px;z-index:35}
.logo{width:60px;height:60px;border-radius:50%;object-fit:cover;box-shadow:0 0 22px #ffbf3c}.title{font-family:Cinzel,serif;font-size:38px;font-weight:900;letter-spacing:7px;color:#fff0b1;text-shadow:0 0 10px #ffbf3c}.title::after{content:" | KALINGA";font-family:Orbitron,sans-serif;font-size:12px;letter-spacing:3px;color:#00d4ff;text-shadow:0 0 16px #00d4ff}.welcome{position:absolute;top:17px;right:24px;font-size:12.5px;color:#f7d98b}.welcome span{color:#00d4ff;font-weight:800}
#chatbox{height:calc(100dvh - 226px);overflow-y:auto;padding:24px 34px 140px;scroll-behavior:smooth}.message-row{margin-bottom:18px;display:flex;flex-direction:column}.user{align-self:flex-end;background:linear-gradient(135deg,#0e8bd8,#064f8a);padding:14px 16px;border-radius:18px 18px 4px 18px;width:fit-content;max-width:70%;font-size:14.5px;color:white}.bot{align-self:flex-start;background:rgba(255,196,77,.10);padding:15px 17px;border-radius:18px 18px 18px 4px;max-width:74%;border:1px solid rgba(255,196,77,.17);font-size:14.5px;line-height:1.6;color:#fff6d6;white-space:pre-wrap}
.generated-image,.uploaded-preview{width:100%;max-width:560px;border-radius:18px;border:2px solid rgba(255,196,77,.25);margin-top:12px}.file-actions,.image-actions{margin-top:14px;display:flex;gap:12px;flex-wrap:wrap}.file-btn,.download-btn{display:inline-block;padding:10px 15px;border-radius:12px;text-decoration:none;color:white;font-size:13px;background:#16a34a}.preview-btn,.view-btn{display:inline-block;padding:10px 15px;border-radius:12px;text-decoration:none;color:white;font-size:13px;background:#2563eb}
.tool-bar{position:absolute;left:50%;bottom:78px;transform:translateX(-50%);width:92%;display:flex;gap:10px;align-items:center;flex-wrap:wrap}.select,.tool-chip{padding:10px 12px;border-radius:14px;background:rgba(255,196,77,.09);border:1px solid rgba(255,196,77,.18);color:#fff7d6;outline:none;font-size:12px}.select option{background:#1a0d02}.tool-chip{cursor:pointer}
.bottom{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:92%;display:flex;gap:10px;align-items:center}#message{flex:1;padding:15px 17px;font-size:14.5px;border:none;outline:none;border-radius:28px;background:rgba(255,196,77,.085);border:1px solid rgba(255,196,77,.18);color:#fff7d6}.icon{width:52px;height:52px;border:none;border-radius:50%;font-size:20px;cursor:pointer;background:rgba(255,196,77,.12);color:#fff1bf;border:1px solid rgba(255,196,77,.18)}.send{width:76px;height:52px;border:none;border-radius:28px;font-size:23px;font-weight:bold;cursor:pointer;background:linear-gradient(90deg,#ffbf3c,#bd6b00);color:#1b0c00}
.empty-state{text-align:center;margin-top:10vh}.empty-state h2{font-family:Cinzel,serif;font-size:34px;color:#fff0b1}.empty-state p{margin-top:8px;color:#d6c08a}.quick-prompts{margin-top:22px;display:flex;flex-wrap:wrap;justify-content:center;gap:12px}.quick{padding:12px 15px;border-radius:15px;background:rgba(255,196,77,.08);border:1px solid rgba(255,196,77,.17);cursor:pointer;color:#fff1bf;font-size:13px}.overlay{display:none}
@media(max-width:1050px){.sidebar{width:250px;min-width:250px}.title{font-size:32px}}
@media(max-width:800px){body{height:100dvh;overflow:hidden}.app{height:100dvh}.sidebar{position:fixed;left:-285px;top:0;height:100dvh;width:275px;min-width:275px;border-right:1px solid rgba(255,196,77,.35)}.sidebar.open{left:0}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.60);z-index:30}.overlay.show{display:block}.mobile-menu{display:block}.header{height:76px;padding-left:62px;justify-content:flex-start;gap:10px}.logo{width:44px;height:44px}.title{font-size:23px;letter-spacing:3px;max-width:calc(100vw - 150px);white-space:nowrap}.title::after{content:""}.welcome{display:none}#chatbox{height:calc(100dvh - 218px);padding:16px 12px 155px}.message-row{margin-bottom:14px}.bot,.user{max-width:92%;font-size:13.5px;padding:13px 14px}.generated-image,.uploaded-preview{max-width:100%;border-radius:14px}.tool-bar{width:96%;bottom:74px;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}.tool-bar::-webkit-scrollbar{display:none}.select,.tool-chip{min-width:max-content;padding:9px 10px;font-size:11.5px;border-radius:13px}.bottom{width:96%;bottom:max(10px, env(safe-area-inset-bottom));gap:6px}.icon{width:42px;height:42px;min-width:42px;font-size:18px}.send{width:54px;height:42px;min-width:54px;font-size:20px}#message{min-width:0;padding:12px 13px;font-size:13.5px}.empty-state{margin-top:7vh;padding:0 10px}.empty-state h2{font-size:27px}.empty-state p{font-size:13px}.quick-prompts{gap:8px}.quick{font-size:12px;padding:10px 12px}.side-links{grid-template-columns:1fr}}
@media(max-width:420px){.header{height:70px}.title{font-size:20px;letter-spacing:2px}.logo{width:40px;height:40px}#chatbox{height:calc(100dvh - 210px)}.icon{width:39px;height:39px;min-width:39px}.send{width:48px;height:39px;min-width:48px}#message{font-size:13px}}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
<div class="sidebar" id="sidebar">
<div class="brand"><img src="{{ url_for('static', filename='logo.png') }}" class="side-logo"><div class="brand-name">SAIVEX</div></div>
<div class="profile-box"><div class="profile-title">Logged in as</div><div class="profile-name">{{ user.name }}</div><div class="side-links"><a class="side-link" href="/profile">Profile</a><a class="side-link" href="/settings">Settings</a><a class="side-link logout" href="/logout">Logout</a></div></div>
<div class="sidebar-actions"><button class="new-chat" onclick="newChat()">+ New Chat</button><button class="clear-chat" onclick="clearHistory()">Clear</button></div>
<input class="search-box" id="searchBox" placeholder="Search chats..." oninput="renderConversations()">
<div class="section-title">Conversations</div><div id="conversationPanel"></div>
<div class="section-title">Memory</div><div id="memoryPanel"></div>
<div class="section-title">Documents</div><div id="documentPanel"></div>
</div>
<div class="main">
<button class="mobile-menu" onclick="toggleSidebar()">☰</button>
<div class="header"><img src="{{ url_for('static', filename='logo.png') }}" class="logo"><div class="title">SAIVEX</div><div class="welcome">Welcome, <span>{{ user.name }}</span></div></div>
<div id="chatbox"><div class="empty-state" id="emptyState"><h2>Saivex Kalinga</h2><p>Mobile responsive AI assistant with vision, memory, files, and productivity tools.</p><div class="quick-prompts"><div class="quick" onclick="setPrompt('explain my uploaded image')">👁️ Explain Image</div><div class="quick" onclick="setPrompt('create ppt about Kalinga empire')">📊 Create PPT</div><div class="quick" onclick="setPrompt('create website for my portfolio')">🌐 Website</div><div class="quick" onclick="setPrompt('search: latest AI news')">🔎 Search</div></div></div></div>
<div class="tool-bar"><select id="imageStyle" class="select"><option value="cinematic">Cinematic</option><option value="realistic">Realistic</option><option value="anime">Anime</option><option value="logo">Logo</option><option value="wallpaper">Wallpaper</option><option value="fantasy">Fantasy</option></select><select id="imageRatio" class="select"><option value="1:1">1:1</option><option value="16:9">16:9</option><option value="9:16">9:16</option><option value="4:5">4:5</option></select><button class="tool-chip" onclick="toolPrompt('ppt')">📊 PPT</button><button class="tool-chip" onclick="toolPrompt('pdf')">📄 PDF</button><button class="tool-chip" onclick="toolPrompt('website')">🌐 Website</button><button class="tool-chip" onclick="toolPrompt('code')">💻 Code</button><button class="tool-chip" onclick="toolPrompt('search')">🔎 Search</button></div>
<div class="bottom"><button class="icon" id="voiceBtn" onclick="startVoice()">🎤</button><button class="icon" onclick="uploadFile()">📎</button><button class="icon" onclick="uploadImage()">👁️</button><input type="file" id="fileInput" style="display:none" accept=".pdf,.docx,.txt" onchange="handleFileUpload()"><input type="file" id="imageInput" style="display:none" accept="image/png,image/jpeg,image/jpg,image/webp" onchange="handleImageUpload()"><input id="message" placeholder="Ask Saivex anything..."><button class="send" onclick="sendMessage()">➤</button></div>
</div>
</div>
<script src="{{ url_for('static', filename='stage3_app.js') }}"></script>
</body>
</html>
