<!DOCTYPE html>
<html>
<head>
<title>Saivex Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
body{
    margin:0;
    min-height:100vh;
    font-family:Arial,sans-serif;
    background:radial-gradient(circle at top,#3b2204,#080300 55%),#080300;
    color:#fff7d6;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:18px;
}
.card{
    width:100%;
    max-width:430px;
    background:rgba(255,196,77,.08);
    border:1px solid rgba(255,196,77,.25);
    border-radius:26px;
    padding:28px;
    box-shadow:0 0 35px rgba(255,191,60,.18);
}
.logo{
    width:85px;
    height:85px;
    border-radius:50%;
    display:block;
    margin:0 auto 12px;
    object-fit:cover;
    box-shadow:0 0 25px #ffbf3c;
}
h1{
    text-align:center;
    color:#ffdf8a;
    letter-spacing:4px;
    margin-bottom:22px;
}
.oauth{
    width:100%;
    padding:15px;
    border-radius:28px;
    border:1px solid rgba(255,196,77,.35);
    background:rgba(255,255,255,.06);
    color:#fff7d6;
    font-weight:bold;
    font-size:15px;
    margin-bottom:12px;
    cursor:pointer;
}
.divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:20px 0;
    color:#d6c08a;
    font-size:13px;
}
.divider:before,.divider:after{
    content:"";
    flex:1;
    height:1px;
    background:rgba(255,196,77,.25);
}
input{
    width:100%;
    padding:16px;
    border-radius:24px;
    border:1px solid rgba(255,196,77,.35);
    background:rgba(0,0,0,.25);
    color:white;
    outline:none;
    margin-bottom:12px;
    font-size:15px;
}
button.login{
    width:100%;
    padding:16px;
    border:none;
    border-radius:24px;
    background:linear-gradient(90deg,#ffbf3c,#b66a00);
    color:#1b0c00;
    font-weight:900;
    font-size:16px;
    cursor:pointer;
}
a{
    display:block;
    text-align:center;
    color:#ffdf8a;
    margin-top:18px;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="card">
    <img src="/static/logo.png" class="logo">
    <h1>SAIVEX</h1>

    <button class="oauth" onclick="alert('Google login will be connected in OAuth phase')">🌐 Continue with Google</button>
    <button class="oauth" onclick="alert('Apple login will be connected in OAuth phase')"> Continue with Apple</button>
    <button class="oauth" onclick="alert('Phone login will be connected in Firebase phase')">📞 Continue with Phone</button>

    <div class="divider">OR</div>

    <form method="POST">
        <input name="email" placeholder="Email address" required>
        <input name="password" type="password" placeholder="Password" required>
        <button class="login" type="submit">Continue</button>
    </form>

    <a href="/signup">Create new account</a>
</div>

</body>
</html>
