<!DOCTYPE html>
<html><head><title>Saivex Profile</title><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;min-height:100dvh;background:radial-gradient(circle at top left,rgba(255,190,72,.22),transparent 35%),linear-gradient(135deg,#080300,#061324);color:#fff7d6;display:flex;justify-content:center;align-items:center;padding:18px}.card{width:100%;max-width:430px;background:rgba(255,196,77,.08);border:1px solid rgba(255,196,77,.25);border-radius:24px;padding:28px;text-align:center}img{width:90px;height:90px;border-radius:50%;object-fit:cover;box-shadow:0 0 25px #ffbf3c}h1{color:#ffdf8a;margin:18px 0 6px}p{color:#d6c08a;word-break:break-all}.btn{display:block;margin:12px 0;padding:13px;border-radius:14px;background:#b66a00;color:white;text-decoration:none}@media(max-width:500px){.card{padding:22px}}
</style></head><body><div class="card"><img src="/static/logo.png"><h1>{{ user.name }}</h1><p>{{ user.email }}</p><a class="btn" href="/">Back to Saivex</a><a class="btn" href="/settings">Settings</a></div></body></html>
