<!DOCTYPE html>
<html><head><title>Saivex Settings</title><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;min-height:100dvh;background:radial-gradient(circle at top left,rgba(255,190,72,.22),transparent 35%),linear-gradient(135deg,#080300,#061324);color:#fff7d6;display:flex;justify-content:center;align-items:center;padding:18px}.card{width:100%;max-width:430px;background:rgba(255,196,77,.08);border:1px solid rgba(255,196,77,.25);border-radius:24px;padding:28px}h1{text-align:center;color:#ffdf8a}.row{padding:14px;border-radius:14px;background:rgba(255,255,255,.06);margin:12px 0}.btn{display:block;text-align:center;margin-top:16px;padding:13px;border-radius:14px;background:#b66a00;color:white;text-decoration:none}@media(max-width:500px){.card{padding:22px}}
</style></head><body><div class="card"><h1>Settings</h1><div class="row">Theme: {{ settings.theme }}</div><div class="row">Voice Reply: {{ settings.voice_enabled }}</div><div class="row">Image Style: {{ settings.image_style }}</div><a class="btn" href="/">Back to Saivex</a></div></body></html>
